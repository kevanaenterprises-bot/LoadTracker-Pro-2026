<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christy — LoadTracker PRO</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
  }

  /* ── Launcher button (bottom-right corner) ── */
  #christy-launcher {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    cursor: pointer;
  }

  .launcher-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 3px solid #fff;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    transition: transform 0.2s, box-shadow 0.2s;
    background: #0f2d72;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .launcher-btn:hover { transform: scale(1.08); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }

  .launcher-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .launcher-label {
    position: absolute;
    bottom: 78px;
    right: 0;
    background: #0f2d72;
    color: white;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .status-dot {
    position: absolute;
    bottom: 4px;
    right: 4px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid #fff;
  }

  .status-dot.online { background: #22c55e; }
  .status-dot.offline { background: #94a3b8; }

  /* ── Main panel ── */
  #christy-panel {
    position: fixed;
    bottom: 108px;
    right: 24px;
    width: 380px;
    max-height: 600px;
    z-index: 9998;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: none;
    flex-direction: column;
    background: #fff;
    transition: background 0.8s;
  }

  #christy-panel.office { background: #f8fafc; }
  #christy-panel.afterhours { background: #0f172a; }

  /* Video section */
  #christy-video-wrap {
    position: relative;
    width: 100%;
    height: 260px;
    background: #1e293b;
    overflow: hidden;
  }

  #christy-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  #christy-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f2d72, #1e40af);
    color: white;
  }

  .avatar-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin-bottom: 12px;
    border: 3px solid rgba(255,255,255,0.4);
  }

  .video-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .christy-name {
    color: white;
    font-weight: 700;
    font-size: 16px;
  }

  .christy-title {
    color: rgba(255,255,255,0.8);
    font-size: 12px;
  }

  .speaking-indicator {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 20px;
  }

  .speaking-indicator span {
    width: 3px;
    background: #22c55e;
    border-radius: 3px;
    animation: speaking 0.8s ease-in-out infinite;
  }

  .speaking-indicator span:nth-child(2) { animation-delay: 0.1s; }
  .speaking-indicator span:nth-child(3) { animation-delay: 0.2s; }
  .speaking-indicator span:nth-child(4) { animation-delay: 0.3s; }
  .speaking-indicator span:nth-child(5) { animation-delay: 0.4s; }

  @keyframes speaking {
    0%, 100% { height: 4px; }
    50% { height: 16px; }
  }

  /* After hours overlay */
  #afterhours-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    padding: 20px;
    display: none;
  }

  #afterhours-overlay .moon { font-size: 40px; margin-bottom: 12px; }
  #afterhours-overlay h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  #afterhours-overlay p { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.5; }

  /* Chat section */
  #christy-chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 200px;
  }

  .message {
    max-width: 85%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
  }

  .message.christy {
    background: #eff6ff;
    color: #1e3a8a;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .message.user {
    background: #0f2d72;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .message.afterhours {
    background: #1e293b;
    color: #94a3b8;
  }

  /* Input */
  #christy-input-wrap {
    padding: 12px 16px;
    border-top: 1px solid #e2e8f0;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #christy-input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #e2e8f0;
    border-radius: 20px;
    font-size: 13px;
    outline: none;
    background: #f8fafc;
  }

  #christy-input:focus { border-color: #0f2d72; background: #fff; }

  #christy-send {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #0f2d72;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  #christy-send:hover { background: #1e40af; }
  #christy-send svg { width: 16px; height: 16px; fill: white; }

  /* Close button */
  #christy-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    border: none;
    cursor: pointer;
    color: white;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    line-height: 1;
  }

  /* Typing indicator */
  .typing { display: flex; gap: 4px; align-items: center; padding: 8px 12px; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: #94a3b8; animation: typing 1s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%,100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

  @media (max-width: 440px) {
    #christy-panel { width: calc(100vw - 32px); right: 16px; }
    #christy-launcher { right: 16px; bottom: 16px; }
  }
</style>
</head>
<body>

<!-- Launcher button -->
<div id="christy-launcher" onclick="toggleChristy()">
  <div class="launcher-btn">
    <span style="font-size:28px;">👩‍💼</span>
  </div>
  <div class="launcher-label">Chat with Christy</div>
  <div class="status-dot online" id="status-dot"></div>
</div>

<!-- Main panel -->
<div id="christy-panel">
  <div id="christy-video-wrap">
    <button id="christy-close" onclick="toggleChristy()">✕</button>

    <!-- Placeholder (shows until LiveAvatar connects) -->
    <div id="christy-placeholder">
      <div class="avatar-circle">👩‍💼</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:4px;">Christy</div>
      <div style="font-size:13px;opacity:0.7;">LoadTracker PRO</div>
    </div>

    <!-- LiveAvatar video stream -->
    <video id="christy-video" autoplay playsinline style="display:none;"></video>

    <!-- After hours overlay -->
    <div id="afterhours-overlay">
      <div class="moon">🌙</div>
      <h3>Christy's out for the night</h3>
      <p>Office hours are 8am–6pm CST.<br>Leave a message and she'll get back to you in the morning.<br><br>The demo is still live — go explore!</p>
    </div>

    <div class="video-overlay">
      <div>
        <div class="christy-name">Christy</div>
        <div class="christy-title">LoadTracker PRO Rep</div>
      </div>
      <div class="speaking-indicator" id="speaking-indicator" style="display:none;">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div id="christy-chat"></div>

  <!-- Input -->
  <div id="christy-input-wrap">
    <input id="christy-input" type="text" placeholder="Ask Christy anything..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button id="christy-send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
const API_BASE = window.CHRISTY_API || 'http://localhost:3002';
let sessionId = null;
let peerConnection = null;
let chatHistory = [];
let officeHours = true;
let panelOpen = false;

// Check status on load
async function init() {
  try {
    const r = await fetch(`${API_BASE}/api/christy/status`);
    const d = await r.json();
    officeHours = d.office_hours;

    if (!officeHours) {
      document.getElementById('status-dot').className = 'status-dot offline';
      document.getElementById('afterhours-overlay').style.display = 'flex';
    }

    // Notify of visitor
    fetch(`${API_BASE}/api/christy/visitor`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ referrer: document.referrer, page: window.location.pathname }),
    }).catch(() => {});
  } catch(e) {
    console.warn('[Christy] Server not reachable:', e.message);
  }
}

async function toggleChristy() {
  panelOpen = !panelOpen;
  const panel = document.getElementById('christy-panel');
  panel.style.display = panelOpen ? 'flex' : 'none';

  if (panelOpen && chatHistory.length === 0) {
    // Send greeting
    await greetUser();
  }
}

async function greetUser() {
  const greeting = officeHours
    ? "Hey! 👋 Welcome to LoadTracker PRO! I'm Christy. You looking to get a handle on your freight operations? I've got a free demo ready to go — or just ask me anything. What's on your mind?"
    : "Hey! 🌙 Christy here — I'm out for the night but the demo is still wide open. Poke around, and leave me a note if you have questions. I'll get back to you first thing in the morning! 😊";

  addMessage('christy', greeting);

  // If LiveAvatar is connected, make her speak the greeting
  if (sessionId) {
    await speakText(greeting);
  }
}

async function sendMessage() {
  const input = document.getElementById('christy-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  addMessage('user', text);
  chatHistory.push({ role: 'user', content: text });

  // Show typing
  const typingEl = document.createElement('div');
  typingEl.className = 'typing';
  typingEl.innerHTML = '<span></span><span></span><span></span>';
  typingEl.id = 'typing-indicator';
  document.getElementById('christy-chat').appendChild(typingEl);
  scrollChat();

  try {
    const r = await fetch(`${API_BASE}/api/christy/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: chatHistory }),
    });
    const d = await r.json();

    document.getElementById('typing-indicator')?.remove();

    const reply = d.text || "Hmm, I had a little hiccup there! Can you ask me again? 😄";
    addMessage('christy', reply);
    chatHistory.push({ role: 'assistant', content: reply });

    // Make avatar speak
    if (sessionId) await speakText(reply);

  } catch(e) {
    document.getElementById('typing-indicator')?.remove();
    addMessage('christy', "Oops, I lost my connection for a second! Try again? 😄");
  }
}

function addMessage(from, text) {
  const chat = document.getElementById('christy-chat');
  const el = document.createElement('div');
  el.className = `message ${from}`;
  el.textContent = text;
  chat.appendChild(el);
  scrollChat();
}

function scrollChat() {
  const chat = document.getElementById('christy-chat');
  chat.scrollTop = chat.scrollHeight;
}

// ── LiveAvatar WebRTC ───────────────────────────────────────────────────────

async function startAvatar() {
  try {
    // Create session
    const r = await fetch(`${API_BASE}/api/christy/session/start`, { method: 'POST' });
    const d = await r.json();
    if (d.error) { console.warn('[Christy] Avatar start error:', d.error); return; }

    sessionId = d.session_id;

    // Set up WebRTC
    peerConnection = new RTCPeerConnection({ iceServers: d.ice_servers });

    peerConnection.ontrack = (e) => {
      const video = document.getElementById('christy-video');
      const placeholder = document.getElementById('christy-placeholder');
      if (e.track.kind === 'video') {
        video.srcObject = e.streams[0];
        video.style.display = 'block';
        placeholder.style.display = 'none';
      }
    };

    peerConnection.onicecandidate = async (e) => {
      if (e.candidate) {
        await fetch(`${API_BASE}/api/christy/session/ice`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, candidate: e.candidate }),
        }).catch(() => {});
      }
    };

    // Set remote SDP
    await peerConnection.setRemoteDescription(new RTCSessionDescription(d.sdp));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);

    // Connect
    await fetch(`${API_BASE}/api/christy/session/connect`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, sdp: answer }),
    });

    console.log('[Christy] LiveAvatar connected!');
  } catch(e) {
    console.warn('[Christy] LiveAvatar not available, using text-only mode:', e.message);
  }
}

async function speakText(text) {
  if (!sessionId) return;
  // Strip emojis for cleaner speech
  const cleanText = text.replace(/[\u{1F300}-\u{1F9FF}]/gu, '').trim();
  document.getElementById('speaking-indicator').style.display = 'flex';
  try {
    await fetch(`${API_BASE}/api/christy/speak`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, text: cleanText }),
    });
  } catch(e) { /* non-critical */ }
  setTimeout(() => {
    document.getElementById('speaking-indicator').style.display = 'none';
  }, cleanText.length * 60); // rough estimate
}

// Init
init();
// Try to start avatar (will gracefully fail if API not reachable)
startAvatar().catch(() => {});
</script>
</body>
</html>
